    <meta charset="UTF-8" />

    <title>Document</title>
    <style>
      :root {
        --clr-dark: red;
        --clr-light: #f7fafc;
        --clr-accent: #3789c1;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Roboto', sans-serif;
        color: var(--clr-dark);
        background-color: var(--clr-light);
        margin: 5em 0;
      }

      .container {
        width: 80%;
        margin: 0 auto;
      }

      .item {
        padding: 0.5em;
        background-color: #63b3ed;
        font-weight: 700;
        color: var(--clr-light);
        border: 10px solid var(--clr-accent);
      }
    </style>
    <link rel="stylesheet" href="./index.css">
  </head>
